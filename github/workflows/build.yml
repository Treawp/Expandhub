name: Build Addon

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*') }}

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: "8.8"

      - name: Check meteor jar
        run: |
          if [ ! -f libs/meteor-client-1.21.11-65.jar ]; then
            echo "ERROR: libs/meteor-client-1.21.11-65.jar tidak ada!"
            exit 1
          fi

      - name: Build
        run: ./gradlew build --no-daemon --stacktrace

      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: myaddon-${{ github.sha }}
          path: build/libs/*.jar
          if-no-files-found: error
